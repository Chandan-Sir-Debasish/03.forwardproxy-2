services:
  nginx-proxy:
    image: nginx:alpine
    container_name: forward-proxy
    ports:
      - "8888:8888"
      - "8889:8889"
      # Removed 8443 because CONNECT is not supported
      #- "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      proxy-network:
        ipv4_address: 172.20.0.2

  client1:
    image: alpine/curl
    container_name: client1
    command: sleep infinity
    networks:
      proxy-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - nginx-proxy

  client2:
    image: alpine/curl
    container_name: client2
    command: sleep infinity
    networks:
      proxy-network:
        ipv4_address: 172.20.0.11
    depends_on:
      - nginx-proxy

networks:
  proxy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
