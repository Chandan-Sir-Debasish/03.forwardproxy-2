events {
    worker_connections 1024;
}

http {
    # Forward proxy configuration
    server {
        listen 8888;

        resolver 8.8.8.8 8.8.4.4;

        # Access control - allow specific clients only
        allow 172.20.0.10;
        allow 172.20.0.11;
        deny all;

        access_log /var/log/nginx/forward-proxy-access.log;
        error_log /var/log/nginx/forward-proxy-error.log;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://$http_host$request_uri;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
    }

    # Content filtering proxy
    server {
        listen 8889;
        resolver 8.8.8.8;

        location / {
            if ($http_host ~* (facebook\.com|twitter\.com|instagram\.com)) {
                return 403 "Access to social media is blocked by company policy\n";
            }
            if ($http_host ~* (youtube\.com|netflix\.com|hulu\.com)) {
                return 403 "Video streaming is blocked during work hours\n";
            }
            proxy_pass http://$http_host$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }


    # Note: HTTPS (CONNECT) proxy requires additional module (ngx_http_proxy_connect_module)
    # For HTTPS sites, clients should use HTTP URLs or the proxy will fail.
    # To proxy HTTPS, you would need a custom Nginx build with the module.
    # HTTPS forward proxy
    # server {
    #     listen 8443;
    #     proxy_connect;
    #     proxy_connect_allow 443 563;
    #     proxy_connect_connect_timeout 10s;
    #     proxy_connect_read_timeout 10s;
    #     resolver 8.8.8.8;
    #     location / {
    #         proxy_pass https://$host$request_uri;
    #         proxy_set_header Host $host;
    #     }
    # }
}